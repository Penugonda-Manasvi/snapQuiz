<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapQuiz — Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:#03050f;color:#f0f6ff;min-height:100vh;overflow-x:hidden}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
    .page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:1}
    .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;text-align:center}

    .brand{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;background:linear-gradient(135deg,#fff,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2rem;animation:fadeDown 0.5s ease both}

    .emoji{font-size:4rem;margin-bottom:0.8rem;animation:bounceIn 0.6s ease both}
    @keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}

    .result-title{font-family:'Space Mono',monospace;font-size:0.8rem;color:#94a3b8;text-transform:uppercase;letter-spacing:3px;margin-bottom:0.3rem;animation:fadeUp 0.5s ease 0.1s both}
    .player-name{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:1.5rem;animation:fadeUp 0.5s ease 0.2s both}

    .score-card{background:#0d1117;border:1px solid #1e3a5f;border-radius:20px;padding:1.8rem;width:100%;margin-bottom:1.2rem;animation:fadeUp 0.5s ease 0.3s both}
    .big-score{font-family:'Space Mono',monospace;font-size:4rem;font-weight:700;background:linear-gradient(135deg,#fff,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .score-sub{font-size:0.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;margin-top:0.3rem;font-family:'Space Mono',monospace}

    .stats-row{display:flex;gap:0.6rem;width:100%;margin-bottom:1.2rem;animation:fadeUp 0.5s ease 0.4s both}
    .stat{flex:1;background:#0d1117;border:1px solid #1e3a5f;border-radius:14px;padding:0.8rem;text-align:center;transition:all 0.2s}
    .stat:hover{border-color:#3b82f6;transform:translateY(-2px)}
    .stat-num{font-family:'Space Mono',monospace;font-size:1.2rem;font-weight:700}
    .stat-num.green{color:#22c55e}
    .stat-num.red{color:#f87171}
    .stat-num.blue{color:#60a5fa}
    .stat-label{font-size:0.62rem;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-top:3px}

    .result-msg{background:#0d1117;border:1px solid #1e3a5f;border-radius:14px;padding:1rem;width:100%;margin-bottom:1.5rem;font-size:0.9rem;color:#60a5fa;font-weight:600;animation:fadeUp 0.5s ease 0.5s both;line-height:1.5}

    .btns{display:flex;gap:0.6rem;width:100%;animation:fadeUp 0.5s ease 0.6s both}
    .btn{flex:1;padding:0.95rem;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:12px;font-size:0.9rem;font-family:'Outfit',sans-serif;font-weight:800;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(59,130,246,0.3)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,130,246,0.4)}
    .btn:active{transform:scale(0.98)}
    .btn.outline{background:transparent;border:1.5px solid rgba(59,130,246,0.3);color:#60a5fa;box-shadow:none}
    .btn.outline:hover{border-color:#3b82f6;background:rgba(59,130,246,0.08)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="page">
  <div class="wrap">
    <div class="brand">SnapQuiz</div>
    <div class="emoji" id="emoji">🏆</div>
    <div class="result-title">Quiz Completed!</div>
    <div class="player-name" id="playerName">Well done, Player!</div>

    <div class="score-card">
      <div class="big-score" id="bigScore">0/10</div>
      <div class="score-sub">Your Final Score</div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-num green" id="correctCount">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat">
        <div class="stat-num red" id="wrongCount">0</div>
        <div class="stat-label">Wrong</div>
      </div>
      <div class="stat">
        <div class="stat-num blue" id="accuracy">0%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat">
        <div class="stat-num blue" id="rank">#—</div>
        <div class="stat-label">Rank</div>
      </div>
    </div>

    <div class="result-msg" id="resultMsg">Loading your result...</div>

    <div class="btns">
      <button class="btn outline" onclick="playAgain()">Play Again</button>
      <button class="btn" onclick="goLeaderboard()">Leaderboard →</button>
    </div>
  </div>
</div>

<script>
  // ─── Particle Background ───────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pts = [];
  for (let i = 0; i < 60; i++) {
    pts.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2+0.5, dx:(Math.random()-0.5)*0.4, dy:(Math.random()-0.5)*0.4, o:Math.random()*0.5+0.1 });
  }
  function drawBg() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(96,165,250,${p.o})`;ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(59,130,246,${0.08*(1-d/120)})`;ctx.lineWidth=0.5;ctx.stroke();}}));
    requestAnimationFrame(drawBg);
  }
  drawBg();
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

  // ─── Load Result from URL Params ──────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const name  = params.get('name')  || 'Player';
  const score = parseInt(params.get('score')) || 0;
  const total = parseInt(params.get('total')) || 10;
  const wrong = total - score;
  const pct   = Math.round((score / total) * 100);

  // ─── Fill in the UI ────────────────────────────────────────────
  document.getElementById('playerName').textContent   = 'Well done, ' + name + '!';
  document.getElementById('bigScore').textContent     = score + '/' + total;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent   = wrong;
  document.getElementById('accuracy').textContent     = pct + '%';

  let emoji, msg;
  if (pct >= 90)      { emoji = '🏆'; msg = '🔥 Outstanding! You are an absolute genius!'; }
  else if (pct >= 70) { emoji = '⭐'; msg = '⭐ Great job! You scored above average!'; }
  else if (pct >= 50) { emoji = '👍'; msg = "👍 Good effort! Keep practicing and you'll ace it!"; }
  else                { emoji = '💪'; msg = "💪 Don't give up! Every attempt makes you better!"; }

  document.getElementById('emoji').textContent     = emoji;
  document.getElementById('resultMsg').textContent = msg;

  // ─── Fetch Real Rank from Backend ─────────────────────────────
  async function fetchRank() {
    try {
      const res = await fetch('http://localhost:5000/api/scores');
      if (!res.ok) throw new Error('Failed');
      const data = await res.json();
      const scores = data.data || data; // handle both {data:[]} and []
      const rank = scores.findIndex(s => s.name === name && s.score === score) + 1;
      document.getElementById('rank').textContent = rank > 0 ? '#' + rank : '#' + (scores.length + 1);
    } catch (err) {
      console.warn('Could not fetch rank:', err);
      document.getElementById('rank').textContent = '#—';
    }
  }
  fetchRank();

  // ─── Buttons ──────────────────────────────────────────────────
  function playAgain() { window.location.href = 'index.html'; }
  function goLeaderboard() {
    window.location.href = 'leaderboard.html?name=' + encodeURIComponent(name);
  }
</script>

</body>
</html>
